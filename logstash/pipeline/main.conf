# =============================================================================
# Logstash Pipeline -- Security Log Processing
# Based on teammate's production config, adapted for project cert structure
# =============================================================================

# ---------------------------------- Input ------------------------------------
input {
  beats {
    port => 5044
    # SSL disabled: no filebeat client cert in this deployment's cert structure.
    # Logstash->ES communication remains TLS-encrypted via cacert below.
    ssl => false
    congestion_threshold => 5
  }
}

# ---------------------------------- Filter ------------------------------------
filter {
  # Ensure message and host fields always exist
  if ![message] {
    mutate { add_field => { "message" => "N/A" } }
  }
  if ![host][name] {
    mutate { add_field => { "[host][name]" => "unknown" } }
  }

  # --------------------------------------------------------------------------
  # HMAC-SHA256 INTEGRITY SIGNING (LO3, LO4)
  # Payload: @timestamp | host.name | source.ip | user.name | message
  # --------------------------------------------------------------------------
  ruby {
    code => '
      require "openssl"
      hmac_key = ENV["LOG_HMAC_KEY"] || "default-insecure-key"
      timestamp = event.get("@timestamp").to_s rescue ""
      hostname  = event.get("[host][name]").to_s rescue ""
      source_ip = event.get("[source][ip]") || event.get("source_ip") || ""
      username  = event.get("[user][name]") || event.get("username") || ""
      message   = event.get("message").to_s rescue ""
      payload   = "#{timestamp}|#{hostname}|#{source_ip}|#{username}|#{message}"
      hmac      = OpenSSL::HMAC.hexdigest("SHA256", hmac_key, payload)
      event.set("[integrity][hmac]", hmac)
      event.set("[integrity][algorithm]", "SHA256")
      event.set("[integrity][payload_length]", payload.bytes.length)
    '
  }

  # --------------------------------------------------------------------------
  # SSH AUTHENTICATION LOGS
  # --------------------------------------------------------------------------
  if [log_type] == "ssh_auth" or [message] =~ /sshd\[/ {

    if ![hostname] {
      grok {
        match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:hostname} %{WORD:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:message}" }
        tag_on_failure => []
      }
    }

    if [message] =~ /Failed password/ {
      mutate {
        add_tag => ["ssh_failed_login", "security_alert", "authentication_failure"]
      }
      grok {
        match => { "message" => "Failed password for (?:invalid user )?%{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port}" }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[user][name]"   => "%{username}"
          "[source][ip]"   => "%{source_ip}"
        }
      }

    } else if [message] =~ /Accepted/ {
      mutate {
        add_tag => ["ssh_success", "authentication_success"]
      }
      grok {
        match => { "message" => "Accepted %{WORD:auth_method} for %{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port}" }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "[user][name]" => "%{username}"
          "[source][ip]" => "%{source_ip}"
        }
      }
    }
  }

  # --------------------------------------------------------------------------
  # NGINX ACCESS LOGS
  # --------------------------------------------------------------------------
  else if [log_type] == "nginx_access" or ([message] =~ /GET|POST|PUT|DELETE/ and [message] =~ /HTTP\//) {
    grok {
      match => { "message" => '%{IPORHOST:client_ip} - %{USER:ident} \[%{HTTPDATE:http_timestamp}\] "(?:%{WORD:http_method} %{NOTSPACE:request_uri}(?: HTTP/%{NUMBER:http_version})?|%{DATA:raw_request})" %{NUMBER:response_code} %{NUMBER:response_bytes} "%{DATA:http_referrer}" "%{DATA:http_user_agent}"' }
      tag_on_failure => ["nginx_parse_error"]
    }

    if [client_ip] {
      mutate {
        add_field => {
          "[source][ip]"                    => "%{client_ip}"
          "[http][method]"                  => "%{http_method}"
          "[http][response][status_code]"   => "%{response_code}"
        }
      }
    }

    # SQL Injection detection
    if [request_uri] and ([request_uri] =~ /[%'#\-]/ or [request_uri] =~ /(?i)(union|select|insert|delete|drop)/) {
      if [request_uri] =~ /(?i)(\%27)|(\')|(\-\-)|(\%23)|(#)|(union)|(select)|(insert)|(update)|(delete)|(drop)|(create)|(alter)/ {
        mutate {
          add_tag => ["sql_injection", "web_attack", "security_alert"]
        }
      }
    }

    # XSS detection
    if [request_uri] and ([request_uri] =~ /(?i)(<|javascript:|script>)/) {
      if [request_uri] =~ /(?i)(<script|javascript:|onerror=|onload=|<img|<iframe)/ {
        mutate {
          add_tag => ["xss", "web_attack", "security_alert"]
        }
      }
    }

    if [response_code] == "401" or [response_code] == "403" {
      mutate {
        add_tag => ["access_denied", "security_alert"]
      }
    }
  }

  # --------------------------------------------------------------------------
  # FIREWALL LOGS (UFW / iptables)
  # --------------------------------------------------------------------------
  else if [log_type] == "firewall" or [message] =~ /UFW|iptables/ {
    if [message] =~ /UFW/ {
      grok {
        match => { "message" => "\[UFW %{WORD:firewall_action}\] IN=%{WORD:in_interface} OUT=%{WORD:out_interface} SRC=%{IP:source_ip} DST=%{IP:dest_ip} .* PROTO=%{WORD:protocol} SPT=%{NUMBER:source_port} DPT=%{NUMBER:dest_port}" }
        tag_on_failure => []
      }
      if [source_ip] {
        mutate {
          add_field => {
            "[source][ip]"        => "%{source_ip}"
            "[destination][ip]"   => "%{dest_ip}"
            "[network][protocol]" => "%{protocol}"
          }
          add_tag => ["firewall", "network_traffic"]
        }
      }
      if [firewall_action] == "BLOCK" {
        mutate {
          add_tag => ["blocked_connection", "potential_port_scan", "security_alert"]
        }
      }
    }
  }

  # --------------------------------------------------------------------------
  # TIMESTAMP NORMALIZATION
  # --------------------------------------------------------------------------
  if [syslog_timestamp] or [http_timestamp] {
    date {
      match => [
        "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss",
        "http_timestamp",   "dd/MMM/yyyy:HH:mm:ss Z"
      ]
      target => "@timestamp"
      tag_on_failure => ["timestamp_parse_failure"]
    }
  }

  # --------------------------------------------------------------------------
  # FIELD CLEANUP AND NORMALIZATION
  # --------------------------------------------------------------------------
  mutate {
    remove_field => ["syslog_timestamp", "http_timestamp"]
    copy => {
      "[source][ip]"                  => "source_ip"
      "[destination][ip]"             => "dest_ip"
      "[user][name]"                  => "username"
      "[http][method]"                => "http_method"
      "[http][response][status_code]" => "response_code"
    }
  }

  if "security_alert" in [tags] {
    mutate { add_field => { "alert_level" => "warning" } }
  }

  if "security_alert" in [tags] and ("sql_injection" in [tags] or "xss" in [tags]) {
    mutate { replace => { "alert_level" => "critical" } }
  }
}

# ---------------------------------- Output ------------------------------------
output {
  # All logs -> daily rolling index
  elasticsearch {
    hosts                       => ["https://elasticsearch:9200"]
    index                       => "logs-%{+YYYY.MM.dd}"
    user                        => "${ELASTICSEARCH_USER:elastic}"
    password                    => "${ELASTICSEARCH_PASSWORD:changeme}"
    ssl_enabled                 => true
    ssl_certificate_authorities => ["/etc/logstash/certs/ca.crt"]
  }

  # Security alerts -> separate index for Kibana detection rules
  if "security_alert" in [tags] {
    elasticsearch {
      hosts                       => ["https://elasticsearch:9200"]
      index                       => "security-alerts-%{+YYYY.MM.dd}"
      user                        => "${ELASTICSEARCH_USER:elastic}"
      password                    => "${ELASTICSEARCH_PASSWORD:changeme}"
      ssl_enabled                 => true
      ssl_certificate_authorities => ["/etc/logstash/certs/ca.crt"]
      routing                     => "%{[alert_level]}"
    }
  }
}
