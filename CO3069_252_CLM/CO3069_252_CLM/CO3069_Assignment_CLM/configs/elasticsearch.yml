# ======================== Elasticsearch Configuration =========================
#
# NOTE: Elasticsearch comes with reasonable defaults for most settings.
#       Before you set out to tweak and tune the configuration, make sure you
#       understand what you are trying to accomplish and the consequences.
#
# ---------------------------------- Cluster -----------------------------------
#
cluster.name: security-log-cluster
#
# ------------------------------------ Node ------------------------------------
#
node.name: es-node-1
node.roles: [ master, data, ingest ]
#
# ----------------------------------- Paths ------------------------------------
#
path.data: /var/lib/elasticsearch
path.logs: /var/log/elasticsearch
#
# ----------------------------------- Memory -----------------------------------
#
bootstrap.memory_lock: true
#
# ---------------------------------- Network -----------------------------------
#
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300
#
# --------------------------------- Discovery ----------------------------------
#
discovery.type: single-node
# discovery.seed_hosts: ["es-node-1", "es-node-2"]
# cluster.initial_master_nodes: ["es-node-1"]
#
# ---------------------------------- Security ----------------------------------
#
# Enable security features
xpack.security.enabled: true
xpack.security.enrollment.enabled: true

# Enable encryption for HTTP API client connections
xpack.security.http.ssl:
  enabled: true
  keystore.path: certs/http.p12
  certificate: certs/elasticsearch.crt
  key: certs/elasticsearch.key
  certificate_authorities: certs/ca.crt
  verification_mode: certificate
  client_authentication: optional

# Enable encryption and mutual authentication between cluster nodes
xpack.security.transport.ssl:
  enabled: true
  verification_mode: certificate
  keystore.path: certs/transport.p12
  truststore.path: certs/transport.p12
  certificate: certs/elasticsearch.crt
  key: certs/elasticsearch.key
  certificate_authorities: certs/ca.crt

# Enable audit logging for security events
xpack.security.audit.enabled: true
xpack.security.audit.logfile.events.include:
  - access_granted
  - access_denied
  - authentication_failed
  - authentication_success
  - connection_denied

# ---------------------------------- License -----------------------------------
#
xpack.license.self_generated.type: basic
#
# ---------------------------------- Monitoring --------------------------------
#
xpack.monitoring.collection.enabled: true
#
# ---------------------------------- Index Settings ----------------------------
#
# Set default number of shards and replicas
action.auto_create_index: true
indices.queries.cache.size: 15%

# Index lifecycle management
xpack.ilm.enabled: true

# Retention policy - delete logs older than 365 days
indices.lifecycle.history_index_enabled: true
