# ======================== Logstash Pipeline Configuration =========================
#
# Production-ready log processing pipeline with security detection and HMAC integrity
# Docker-compatible with environment variable configuration
# =============================================================================

# ---------------------------------- Input ------------------------------------
input {
  # Receive logs from Filebeat (primary input)
  beats {
    port => ${LOGSTASH_PORT:5044}
    host => "${LOGSTASH_BIND_HOST:0.0.0.0}"
    
    # SSL configuration - use environment variables
    ssl => ${LOGSTASH_SSL_ENABLED:false}
    
    # Certificate paths with environment variable support
    ssl_certificate => "${LOGSTASH_CERT:/etc/logstash/certs/logstash.crt}"
    ssl_key => "${LOGSTASH_KEY:/etc/logstash/certs/logstash.key}"
    ssl_certificate_authorities => ["${LOGSTASH_CA_CERT:/etc/logstash/certs/ca.crt}"]
    
    # Client verification (can be controlled via env)
    ssl_verify_mode => "${LOGSTASH_SSL_VERIFY:none}"
    
    # Connection settings
    client_inactivity_timeout => 60
  }
}

# ---------------------------------- Filter ------------------------------------
filter {
  # ============================================================================
  # INITIAL NORMALIZATION & STABILITY
  # ============================================================================
  
  # Ensure core fields exist to prevent pipeline stalls
  if ![message] {
    mutate { add_field => { "message" => "empty_message" } }
  }
  
  # Ensure host.name fallback
  if ![host][name] {
    mutate { add_field => { "[host][name]" => "%{[agent][hostname]:unknown}" } }
  }

  # ============================================================================
  # LOG TYPE ROUTING AND PARSING
  # ============================================================================
  
  # SSH Authentication Logs
  if [log_type] == "ssh_auth" or "sshd" in [message] {
    
    # Regex pre-check: Failed logins are common, optimize detection
    if "Failed password" in [message] {
      mutate {
        add_tag => ["ssh_failed_login", "security_alert", "authentication_failure"]
      }
      grok {
        match => { 
          "message" => "Failed password for (?:invalid user )?%{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port}" 
        }
        tag_on_failure => ["ssh_parse_failure"]
      }
    }
    
    # Regex pre-check: Successful logins
    else if "Accepted" in [message] {
      mutate {
        add_tag => ["ssh_success", "authentication_success"]
      }
      grok {
        match => { 
          "message" => "Accepted %{WORD:auth_method} for %{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port}" 
        }
        tag_on_failure => ["ssh_parse_failure"]
      }
    }
    
    # General syslog parsing if not yet done
    if "ssh_parse_failure" not in [tags] and ![username] {
      grok {
        match => { 
          "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:hostname} %{WORD:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:message_detail}" 
        }
        tag_on_failure => []
      }
    }

    # Normalize fields to ECS
    if [username] { mutate { add_field => { "[user][name]" => "%{username}" } } }
    if [source_ip] { mutate { add_field => { "[source][ip]" => "%{source_ip}" } } }
  }
  
  # Nginx Access Logs
  else if [log_type] == "nginx_access" or ("GET" in [message] or "POST" in [message]) {
    grok {
      match => { 
        "message" => '%{IPORHOST:client_ip} - %{USER:ident} \[%{HTTPDATE:http_timestamp}\] "(?:%{WORD:http_method} %{NOTSPACE:request_uri}(?: HTTP/%{NUMBER:http_version})?|%{DATA:raw_request})" %{NUMBER:response_code} %{NUMBER:response_bytes} "%{DATA:http_referrer}" "%{DATA:http_user_agent}"'
      }
      tag_on_failure => ["nginx_parse_error"]
    }
    
    if "nginx_parse_error" not in [tags] {
      mutate {
        add_field => { "[source][ip]" => "%{client_ip}" }
        add_field => { "[http][method]" => "%{http_method}" }
        add_field => { "[http][response][status_code]" => "%{response_code}" }
      }
      
      # SQL Injection Detection - Optimization: only check if common SQL keywords present
      if [request_uri] =~ /(?i)(union|select|insert|delete|drop|update|'|--)/ {
        mutate { add_tag => ["sql_injection", "web_attack", "security_alert"] }
      }
      
      # XSS Detection - Optimization: check for tags or script markers
      if [request_uri] =~ /(?i)(<script|javascript:|onerror=|onload=|<img)/ {
        mutate { add_tag => ["xss", "web_attack", "security_alert"] }
      }

      # Status Code Monitoring
      if [response_code] =~ /^[45]/ {
        mutate { add_tag => ["http_error", "security_alert"] }
      }
    }
  }
  
  # Firewall Logs
  else if [log_type] == "firewall" or "UFW" in [message] or "iptables" in [message] {
    if "UFW" in [message] {
      grok {
        match => { 
          "message" => "\[UFW %{WORD:firewall_action}\] IN=%{WORD:in_interface} OUT=%{WORD:out_interface} SRC=%{IP:source_ip} DST=%{IP:dest_ip} .* PROTO=%{WORD:protocol} SPT=%{NUMBER:source_port} DPT=%{NUMBER:dest_port}" 
        }
        tag_on_failure => ["firewall_parse_error"]
      }
      
      if "firewall_parse_error" not in [tags] {
        mutate {
          add_field => { "[source][ip]" => "%{source_ip}" }
          add_field => { "[destination][ip]" => "%{dest_ip}" }
          add_field => { "[network][protocol]" => "%{protocol}" }
          add_tag => ["firewall", "network_traffic"]
        }
        if [firewall_action] == "BLOCK" {
          mutate { add_tag => ["blocked_connection", "security_alert"] }
        }
      }
    }
  }

  # ============================================================================
  # HMAC-SHA256 INTEGRITY (PRODUCTION READY)
  # ============================================================================
  # Payload: @timestamp + host.name + source.ip + user.name + message
  ruby {
    code => '
      require "openssl"
      
      hmac_key = ENV["LOG_HMAC_KEY"]
      if hmac_key.nil? || hmac_key.empty?
        event.tag("_hmac_key_missing")
        return
      end
      
      # Extract fields with safe fallbacks
      timestamp = event.get("@timestamp").to_s rescue ""
      hostname  = event.get("[host][name]") || "unknown"
      source_ip = event.get("[source][ip]") || "0.0.0.0"
      username  = event.get("[user][name]") || "anonymous"
      message   = event.get("message") || ""
      
      # Build deterministic payload
      payload = "#{timestamp}|#{hostname}|#{source_ip}|#{username}|#{message}"
      
      begin
        hmac = OpenSSL::HMAC.hexdigest("SHA256", hmac_key, payload)
        event.set("[integrity][hmac]", hmac)
        event.set("[integrity][algorithm]", "HMAC-SHA256")
        event.set("[integrity][status]", "signed")
      rescue => e
        event.tag("_hmac_error")
        event.set("[integrity][error]", e.message)
      end
    '
  }

  # ============================================================================
  # TIMESTAMP & CLEANUP
  # ============================================================================
  if [syslog_timestamp] or [http_timestamp] {
    date {
      match => [ 
        "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss",
        "http_timestamp", "dd/MMM/yyyy:HH:mm:ss Z"
      ]
      target => "@timestamp"
    }
  }

  mutate {
    remove_field => ["syslog_timestamp", "http_timestamp", "ident", "raw_request", "client_ip", "hostname"]
    # Ensure source_ip is always at root for legacy compatibility if needed
    copy => { "[source][ip]" => "source_ip" }
  }
}

# ---------------------------------- Output ------------------------------------
output {
  # Debug Output (Controlled via environment variable)
  if "${LOG_DEBUG:false}" == "true" {
    stdout { codec => rubydebug }
  }

  # Primary Storage: Elasticsearch
  if "${ELASTICSEARCH_ENABLED:true}" == "true" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "logs-%{+YYYY.MM.dd}"
      user => "${ELASTICSEARCH_USER:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:}"
      ssl => ${ELASTICSEARCH_SSL_ENABLED:false}
      ssl_certificate_verification => false
    }
  }

  # Alerts: Separate index for security teams
  if "security_alert" in [tags] and "${ELASTICSEARCH_ENABLED:true}" == "true" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
      index => "security-alerts-%{+YYYY.MM.dd}"
      user => "${ELASTICSEARCH_USER:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:}"
      ssl => ${ELASTICSEARCH_SSL_ENABLED:false}
    }
  }
}
