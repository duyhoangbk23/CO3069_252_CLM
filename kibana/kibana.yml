# =============================================================================
# Kibana 8.12 Configuration -- Security Log Management UI
# Certs mounted at /etc/kibana/certs (see docker-compose volumes)
# =============================================================================

# ---------------------------------- Server ------------------------------------
server.port: 5601
server.host: "0.0.0.0"
server.name: "kibana-security"
server.publicBaseUrl: "https://localhost:5601"

server.ssl.enabled: true
server.ssl.certificate: /etc/kibana/certs/kibana/kibana.crt
server.ssl.key: /etc/kibana/certs/kibana/kibana.key
server.ssl.certificateAuthorities: ["/etc/kibana/certs/ca.crt"]

# ---------------------------------- Elasticsearch -----------------------------
elasticsearch.hosts: ["https://elasticsearch:9200"]
elasticsearch.username: "kibana_system"
elasticsearch.password: "${KIBANA_SYSTEM_PASSWORD}"
elasticsearch.ssl.certificateAuthorities: ["/etc/kibana/certs/ca.crt"]
elasticsearch.ssl.verificationMode: full

# ---------------------------------- Security ----------------------------------
xpack.security.enabled: true
xpack.security.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"
xpack.security.session.idleTimeout: "1h"
xpack.security.session.lifespan: "8h"
xpack.security.loginAssistanceMessage: "Security Log Management System -- Authorized Users Only"

# ---------------------------------- Reporting ---------------------------------
xpack.reporting.enabled: true
xpack.reporting.encryptionKey: "${KIBANA_REPORTING_KEY}"
xpack.reporting.kibanaServer.hostname: "localhost"
xpack.reporting.kibanaServer.protocol: https

# ---------------------------------- Misc --------------------------------------
xpack.fleet.enabled: false
telemetry.enabled: false
telemetry.optIn: false
savedObjects.maxImportPayloadBytes: 26214400

# ---------------------------------- Logging -----------------------------------
logging:
  appenders:
    default:
      type: console
      layout:
        type: json
  root:
    level: info
    appenders: [default]
  loggers:
    - name: elasticsearch
      level: warn
