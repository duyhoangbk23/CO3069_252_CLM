# ======================== Logstash Pipeline Configuration =========================
#
# Production-ready log processing pipeline with security detection and HMAC integrity
# Docker-compatible with environment variable configuration
# =============================================================================

# ---------------------------------- Input ------------------------------------
input {
  # Receive logs from Filebeat (primary input)
  beats {
    port => ${LOGSTASH_PORT:5044}
    
    # SSL configuration - use environment variables
    ssl => ${LOGSTASH_SSL_ENABLED:true}
    
    # Certificate paths with environment variable support
    ssl_certificate => "${LOGSTASH_CERT:/etc/logstash/certs/logstash.crt}"
    ssl_key => "${LOGSTASH_KEY:/etc/logstash/certs/logstash.key}"
    ssl_certificate_authorities => ["${LOGSTASH_CA_CERT:/etc/logstash/certs/ca.crt}"]
    
    # Client verification (can be controlled via env)
    ssl_verify_mode => "${LOGSTASH_SSL_VERIFY:force_peer}"
    
    # Host binding
    host => "${LOGSTASH_BIND_HOST:0.0.0.0}"
    
    # Connection timeout
    congestion_threshold => 5
  }

  # Receive syslog messages directly (optional)
  # Disabled by default, enable via LOGSTASH_SYSLOG_ENABLED environment variable
  # syslog {
  #   port => 5514
  #   type => "syslog"
  # }
}

# ---------------------------------- Filter ------------------------------------
filter {
  # Prevent crashes from missing fields - set sensible defaults
  if ![message] {
    mutate {
      add_field => { "message" => "%{@message:N/A}" }
    }
  }
  
  if ![host][name] {
    mutate {
      add_field => { "[host][name]" => "%{[beat][hostname]:unknown}" }
    }
  }

  # ============================================================================
  # HMAC INTEGRITY VERIFICATION (CRITICAL SECURITY)
  # ============================================================================
  # Compute HMAC-SHA256 on a consistent payload
  # Payload: @timestamp + host.name + source.ip + user.name + message
  # Uses LOG_HMAC_KEY environment variable (must be set in production)
  
  ruby {
    path => "/dev/stdin"
    code => '
      require "openssl"
      
      event_obj = event
      hmac_key = ENV["LOG_HMAC_KEY"] || "default-insecure-key"
      
      # Build HMAC payload from normalized fields
      timestamp = event_obj.get("@timestamp").to_s rescue ""
      hostname = event_obj.get("[host][name]").to_s rescue ""
      source_ip = event_obj.get("[source][ip]") || event_obj.get("source_ip") || ""
      username = event_obj.get("[user][name]") || event_obj.get("username") || ""
      message = event_obj.get("message").to_s rescue ""
      
      # Create payload in deterministic order
      payload = "#{timestamp}|#{hostname}|#{source_ip}|#{username}|#{message}"
      
      # Compute HMAC-SHA256
      hmac = OpenSSL::HMAC.hexdigest("SHA256", hmac_key, payload)
      event_obj.set("[integrity][hmac]", hmac)
      event_obj.set("[integrity][algorithm]", "SHA256")
      event_obj.set("[integrity][payload_hash]", payload.bytes.length)
    '
  }
  
  # ============================================================================
  # LOG TYPE ROUTING AND PARSING
  # ============================================================================
  
  # SSH Authentication Logs - Early return to avoid regex processing
  if [log_type] == "ssh_auth" or [message] =~ "sshd\[" {
    
    # Parse standard syslog format if not already parsed
    if ![hostname] {
      grok {
        match => { 
          "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:hostname} %{WORD:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:message}" 
        }
        tag_on_failure => []
      }
    }
    
    # Failed password detection
    if [message] =~ /Failed password/ {
      mutate {
        add_tag => ["ssh_failed_login", "security_alert", "authentication_failure"]
      }
      
      grok {
        match => { 
          "message" => "Failed password for (?:invalid user )?%{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port}" 
        }
        tag_on_failure => []
      }
      
      # Normalize field names for consistency
      mutate {
        add_field => { "[user][name]" => "%{username}" }
        add_field => { "[source][ip]" => "%{source_ip}" }
      }
    }
    
    # Successful SSH login detection
    else if [message] =~ /Accepted/ {
      mutate {
        add_tag => ["ssh_success", "authentication_success"]
      }
      
      grok {
        match => { 
          "message" => "Accepted %{WORD:auth_method} for %{USERNAME:username} from %{IP:source_ip} port %{POSINT:source_port}" 
        }
        tag_on_failure => []
      }
      
      # Normalize field names
      mutate {
        add_field => { "[user][name]" => "%{username}" }
        add_field => { "[source][ip]" => "%{source_ip}" }
      }
    }
  }
  
  # Nginx Access Logs - Pre-check before regex
  else if [log_type] == "nginx_access" or ([message] =~ /GET|POST|PUT|DELETE/ and [message] =~ /HTTP\//) {
    
    # Parse Nginx access log format
    grok {
      match => { 
        "message" => '%{IPORHOST:client_ip} - %{USER:ident} \[%{HTTPDATE:http_timestamp}\] "(?:%{WORD:http_method} %{NOTSPACE:request_uri}(?: HTTP/%{NUMBER:http_version})?|%{DATA:raw_request})" %{NUMBER:response_code} %{NUMBER:response_bytes} "%{DATA:http_referrer}" "%{DATA:http_user_agent}"'
      }
      tag_on_failure => ["nginx_parse_error"]
    }
    
    # Normalize to ECS field names
    if [client_ip] {
      mutate {
        add_field => { "[source][ip]" => "%{client_ip}" }
        add_field => { "[http][method]" => "%{http_method}" }
        add_field => { "[http][response][status_code]" => "%{response_code}" }
      }
    }
    
    # SQL Injection Detection - Pre-check: only analyze request_uri if it exists and contains suspicious chars
    if [request_uri] and ([request_uri] =~ /[%'#-]/ or [request_uri] =~ /(union|select|insert|delete|drop)/i) {
      if [request_uri] =~ /(\%27)|(\')|(\-\-)|(\%23)|(#)|(union)|(select)|(insert)|(update)|(delete)|(drop)|(create)|(alter)/i {
        mutate {
          add_tag => ["sql_injection", "web_attack", "security_alert"]
        }
      }
    }
    
    # XSS Detection - Pre-check: look for angle brackets or javascript keyword
    if [request_uri] and ([request_uri] =~ /<|javascript:|script>/i) {
      if [request_uri] =~ /(<script|javascript:|onerror=|onload=|<img|<iframe)/i {
        mutate {
          add_tag => ["xss", "web_attack", "security_alert"]
        }
      }
    }
    
    # Suspicious HTTP response code detection
    if [response_code] == "401" or [response_code] == "403" {
      mutate {
        add_tag => ["access_denied", "security_alert"]
      }
    }
    
    if [response_code] =~ /^5/ {
      mutate {
        add_tag => ["server_error"]
      }
    }
  }
  
  # Firewall Logs - Pre-check for UFW/iptables
  else if ([log_type] == "firewall" or [message] =~ /UFW|iptables/) {
    
    # UFW format
    if [message] =~ /UFW/ {
      grok {
        match => { 
          "message" => "\[UFW %{WORD:firewall_action}\] IN=%{WORD:in_interface} OUT=%{WORD:out_interface} SRC=%{IP:source_ip} DST=%{IP:dest_ip} .* PROTO=%{WORD:protocol} SPT=%{NUMBER:source_port} DPT=%{NUMBER:dest_port}" 
        }
        tag_on_failure => []
      }
      
      if [source_ip] {
        mutate {
          add_field => { "[source][ip]" => "%{source_ip}" }
          add_field => { "[destination][ip]" => "%{dest_ip}" }
          add_field => { "[network][protocol]" => "%{protocol}" }
        }
        add_tag => ["firewall", "network_traffic"]
      }
      
      # Detect blocked connections (potential port scanning)
      if [firewall_action] == "BLOCK" {
        mutate {
          add_tag => ["blocked_connection", "potential_port_scan", "security_alert"]
        }
      }
    }
  }
  
  # ============================================================================
  # TIMESTAMP PARSING
  # ============================================================================
  # Parse multiple timestamp formats (syslog, ISO8601, HTTP date)
  if [syslog_timestamp] or [http_timestamp] or [timestamp] {
    date {
      match => [ 
        "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss",
        "http_timestamp", "dd/MMM/yyyy:HH:mm:ss Z",
        "timestamp", "ISO8601"
      ]
      target => "@timestamp"
      tag_on_failure => ["timestamp_parse_failure"]
    }
  }
  
  # ============================================================================
  # FIELD CLEANUP AND NORMALIZATION
  # ============================================================================
  mutate {
    # Remove internal fields that were used for parsing
    remove_field => [
      "[log][offset]",
      "[agent][version]",
      "[agent][ephemeral_id]",
      "syslog_timestamp",
      "http_timestamp"
    ]
    
    # Copy important fields to root level for better searchability
    copy => {
      "[source][ip]" => "source_ip"
      "[destination][ip]" => "dest_ip"
      "[user][name]" => "username"
      "[http][method]" => "http_method"
      "[http][response][status_code]" => "response_code"
    }
  }
  
  # Add custom fields for easier filtering
  if "security_alert" in [tags] {
    mutate {
      add_field => { "alert_level" => "warning" }
    }
  }
  
  if "security_alert" in [tags] and ("sql_injection" in [tags] or "xss" in [tags]) {
    mutate {
      replace => { "alert_level" => "critical" }
    }
  }
}

# ---------------------------------- Output ------------------------------------
output {
  # Debug output (controlled via LOG_DEBUG environment variable)
  if [@metadata][debug] or "${LOG_DEBUG:false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
  
  # Send all logs to Elasticsearch (if available)
  if "${ELASTICSEARCH_ENABLED:true}" == "true" {
    elasticsearch {
      enabled => true
      hosts => ["${ELASTICSEARCH_HOST:https://elasticsearch:9200}"]
      index => "logs-%{+YYYY.MM.dd}"
      
      # Authentication
      user => "${ELASTICSEARCH_USER:logstash_writer}"
      password => "${ELASTICSEARCH_PASSWORD:}"
      
      # SSL configuration
      ssl => ${ELASTICSEARCH_SSL_ENABLED:true}
      ssl_certificate_verification => ${ELASTICSEARCH_SSL_VERIFY:true}
      cacert => "${ELASTICSEARCH_CA_CERT:/etc/logstash/certs/ca.crt}"
      
      # Resilience settings
      action => "index"
      document_type => "_doc"
      template_overwrite => false
      manage_template => false
      
      # Bulk settings
      batch_size => 125
      idle_flush_time => 1
      
      # Retry policy
      retry_on_conflict => 1
    }
  }
  
  # Send security alerts to separate index
  if "security_alert" in [tags] and "${ELASTICSEARCH_ENABLED:true}" == "true" {
    elasticsearch {
      enabled => true
      hosts => ["${ELASTICSEARCH_HOST:https://elasticsearch:9200}"]
      index => "security-alerts-%{+YYYY.MM.dd}"
      
      # Authentication
      user => "${ELASTICSEARCH_USER:logstash_writer}"
      password => "${ELASTICSEARCH_PASSWORD:}"
      
      # SSL configuration
      ssl => ${ELASTICSEARCH_SSL_ENABLED:true}
      ssl_certificate_verification => ${ELASTICSEARCH_SSL_VERIFY:true}
      cacert => "${ELASTICSEARCH_CA_CERT:/etc/logstash/certs/ca.crt}"
      
      # Document routing for security alerts
      routing => "%{[alert_level]}"
    }
  }
  
  # Optional: Send to file for testing/debugging (controlled via env var)
  if "${LOG_TO_FILE:false}" == "true" {
    file {
      path => "${LOG_OUTPUT_FILE:/tmp/logstash-output.json}"
      codec => json
    }
  }
}
